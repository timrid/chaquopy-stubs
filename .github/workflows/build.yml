name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    outputs:
      matrix:
        description: "JSON array of chunk indices"
        value: ${{ jobs.prepare.outputs.matrix }}

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute build matrix
        id: set-matrix
        run: |
          python3 -c "
          import json, pathlib
          pkgs = sorted(str(p.parent) for p in pathlib.Path('autogen').glob('*/*/pyproject.toml'))
          chunk_size = 100
          chunks = [pkgs[i:i+chunk_size] for i in range(0, len(pkgs), chunk_size)]
          print('matrix=' + json.dumps(list(range(len(chunks)))))
          print('include=' + json.dumps([{'chunk': i, 'packages': c} for i, c in enumerate(chunks)]))
          " >> "$GITHUB_OUTPUT"

  build:
    name: Build chunk ${{ matrix.chunk }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.include) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Show packages to build
        run: |
          echo "Chunk ${{ matrix.chunk }} — packages to build:"
          echo '${{ toJson(matrix.packages) }}' | jq -r '.[]'

      - name: Build packages (chunk ${{ matrix.chunk }})
        run: |
          mkdir -p dist
          echo '${{ toJson(matrix.packages) }}' | jq -r '.[]' | while read -r pkg_dir; do
            uv build "$pkg_dir" --out-dir dist
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.chunk }}
          path: dist/
