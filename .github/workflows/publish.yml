name: Publish to TestPyPI

on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish chunk ${{ matrix.chunk }} to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.build.outputs.matrix) }}
    environment:
      name: testpypi
      url: https://test.pypi.org/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.chunk }}
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true
          attestations: false
          verbose: true
